<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="60%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>

    <!-- Primary glow gradient -->
    <radialGradient id="glow1" cx="75%" cy="20%" r="55%">
      <stop offset="0%" style="stop-color:#6d28d9;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:0"/>
    </radialGradient>

    <!-- Secondary glow -->
    <radialGradient id="glow2" cx="15%" cy="80%" r="45%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0"/>
    </radialGradient>

    <!-- Text gradient for name -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>

    <!-- Accent line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>

    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:0.8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Corner decorative dots -->
  <circle cx="80" cy="80" r="3" fill="#7c3aed" opacity="0.6"/>
  <circle cx="110" cy="80" r="2" fill="#6366f1" opacity="0.4"/>
  <circle cx="80" cy="110" r="2" fill="#6366f1" opacity="0.4"/>

  <circle cx="1120" cy="80" r="3" fill="#7c3aed" opacity="0.6"/>
  <circle cx="1090" cy="80" r="2" fill="#6366f1" opacity="0.4"/>
  <circle cx="1120" cy="110" r="2" fill="#6366f1" opacity="0.4"/>

  <circle cx="80" cy="550" r="3" fill="#7c3aed" opacity="0.6"/>
  <circle cx="110" cy="550" r="2" fill="#6366f1" opacity="0.4"/>
  <circle cx="80" cy="520" r="2" fill="#6366f1" opacity="0.4"/>

  <!-- Main content area - left side -->

  <!-- Logo / Monogram circle -->
  <circle cx="145" cy="248" r="52" fill="#1a1a2e" stroke="#7c3aed" stroke-width="1.5" opacity="0.9"/>
  <circle cx="145" cy="248" r="46" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.4"/>
  <!-- "C" letter -->
  <text x="145" y="270" font-family="Georgia, serif" font-size="58" font-weight="700" fill="url(#nameGrad)" text-anchor="middle">C</text>

  <!-- Accent line under logo -->
  <rect x="80" y="322" width="130" height="2" fill="url(#lineGrad)" rx="1"/>

  <!-- Name heading -->
  <text x="80" y="398" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">Choiril</text>
  <text x="80" y="478" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="url(#nameGrad)" letter-spacing="-1">Ahmad</text>

  <!-- Tagline -->
  <text x="80" y="536" font-family="'Segoe UI', Arial, sans-serif" font-size="22" fill="#94a3b8" letter-spacing="0.5">Entrepreneur &amp; Software Developer</text>

  <!-- Domain pill -->
  <rect x="80" y="560" width="218" height="38" rx="19" fill="#7c3aed" opacity="0.15" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.5"/>
  <text x="189" y="584" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#a78bfa" text-anchor="middle" letter-spacing="0.5">iamchomad.my.id</text>

  <!-- Right side decorative card -->
  <rect x="700" y="100" width="420" height="430" rx="24" fill="url(#cardGrad)" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.08"/>

  <!-- Card top accent bar -->
  <rect x="700" y="100" width="420" height="4" rx="2" fill="url(#lineGrad)"/>

  <!-- Card content -->
  <!-- "Personal Portfolio" label -->
  <rect x="740" y="150" width="148" height="26" rx="13" fill="#7c3aed" opacity="0.2"/>
  <text x="814" y="168" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle" letter-spacing="1" font-weight="600">PERSONAL PORTFOLIO</text>

  <!-- Items in the card -->
  <!-- Item 1 -->
  <rect x="740" y="200" width="36" height="36" rx="10" fill="#7c3aed" opacity="0.2"/>
  <text x="758" y="223" font-family="'Segoe UI', Arial, sans-serif" font-size="18" text-anchor="middle">✍️</text>
  <text x="790" y="215" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="600">Blog &amp; Novel</text>
  <text x="790" y="234" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#64748b">Tulisan, cerita &amp; opini</text>

  <!-- Item 2 -->
  <rect x="740" y="262" width="36" height="36" rx="10" fill="#6366f1" opacity="0.2"/>
  <text x="758" y="285" font-family="'Segoe UI', Arial, sans-serif" font-size="18" text-anchor="middle">🎨</text>
  <text x="790" y="277" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="600">Brand &amp; Design</text>
  <text x="790" y="296" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#64748b">Visual identity &amp; creative work</text>

  <!-- Item 3 -->
  <rect x="740" y="324" width="36" height="36" rx="10" fill="#0ea5e9" opacity="0.2"/>
  <text x="758" y="347" font-family="'Segoe UI', Arial, sans-serif" font-size="18" text-anchor="middle">💻</text>
  <text x="790" y="339" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="600">Software Dev</text>
  <text x="790" y="358" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#64748b">React, Node.js, TypeScript</text>

  <!-- Item 4 -->
  <rect x="740" y="386" width="36" height="36" rx="10" fill="#10b981" opacity="0.2"/>
  <text x="758" y="409" font-family="'Segoe UI', Arial, sans-serif" font-size="18" text-anchor="middle">🎵</text>
  <text x="790" y="401" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="600">Music</text>
  <text x="790" y="420" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#64748b">Koleksi &amp; selera musik</text>

  <!-- Divider line -->
  <line x1="740" y1="448" x2="1080" y2="448" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.08"/>

  <!-- Card footer -->
  <circle cx="758" cy="476" r="8" fill="#22c55e" opacity="0.9"/>
  <text x="774" y="481" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#94a3b8">Open to work &amp; collaboration</text>

  <!-- Vertical separator line between left and right -->
  <line x1="620" y1="120" x2="620" y2="510" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.06"/>

  <!-- Floating decorative elements -->
  <circle cx="660" cy="180" r="4" fill="#7c3aed" opacity="0.5"/>
  <circle cx="668" cy="220" r="2.5" fill="#6366f1" opacity="0.35"/>
  <circle cx="650" cy="260" r="3" fill="#4f46e5" opacity="0.4"/>
  <circle cx="663" cy="310" r="2" fill="#7c3aed" opacity="0.3"/>
  <circle cx="655" cy="350" r="4" fill="#6366f1" opacity="0.4"/>
  <circle cx="667" cy="400" r="2.5" fill="#4f46e5" opacity="0.3"/>
  <circle cx="652" cy="450" r="3" fill="#7c3aed" opacity="0.35"/>
</svg>
